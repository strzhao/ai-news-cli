name: Publish to npm

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: npm
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
      - name: Verify trusted publishing runtime
        run: |
          node --version
          NPM_VERSION=$(npm --version)
          echo "$NPM_VERSION"
          node -e 'const version = process.argv[1]; const [major, minor, patch] = version.split(".").map(Number); const ok = major > 11 || (major === 11 && (minor > 5 || (minor === 5 && patch >= 1))); if (!ok) { console.error(`npm ${version} does not satisfy trusted publishing minimum 11.5.1`); process.exit(1); }' "$NPM_VERSION"
      - name: Verify tag matches package.json version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)"
            exit 1
          fi
      - run: npm ci
      - run: npm run build
      - run: npm publish --provenance --access public
